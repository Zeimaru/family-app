<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 가족</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     Toast
══════════════════════════════════════ -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ══════════════════════════════════════
     모달 영역 (동적 삽입)
══════════════════════════════════════ -->
<div id="modalRoot"></div>

<!-- ══════════════════════════════════════
     앱 레이아웃
══════════════════════════════════════ -->
<div class="app-layout" id="appLayout" style="display:none">

  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><i class="ti ti-home-heart"></i></div>
      <span id="famNameDisplay">우리 가족</span>
    </div>

    <nav class="nav-group">
      <div class="nav-label">메뉴</div>
      <div class="nav-item active" data-page="dashboard">
        <i class="ti ti-layout-dashboard"></i><span>홈</span>
      </div>
      <div class="nav-item" data-page="edu">
        <i class="ti ti-book-2"></i><span>열심히 공부</span>
      </div>
      <div class="nav-item" data-page="calendar">
        <i class="ti ti-calendar"></i><span>가족 캘린더</span>
      </div>
      <div class="nav-item" data-page="todo">
        <i class="ti ti-checkbox"></i><span>학교 알림장/숙제/준비물</span>
      </div>
      <div class="nav-item" data-page="growth">
        <i class="ti ti-seedling"></i><span>가족 기록</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="nav-label" style="padding:0 4px;margin-bottom:6px">구성원</div>
      <div id="memberList"></div>
      <div class="nav-item mt-2" id="btnSettings" style="margin-top:8px">
        <i class="ti ti-settings"></i><span>설정</span>
      </div>
      <div class="nav-item" id="btnLogout">
        <i class="ti ti-logout"></i><span>로그아웃</span>
      </div>
    </div>
  </aside>

  <!-- 메인 콘텐츠 -->
  <main class="main-content">
    <div class="page-wrap" id="pageContent">
      <!-- 각 페이지가 여기 렌더링됩니다 -->
    </div>
  </main>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/edu.js"></script>
<script src="js/pages/calendar.js"></script>
<script src="js/pages/todo.js"></script>
<script src="js/pages/growth.js"></script>
<script src="js/app.js"></script>

</body>
</html>
